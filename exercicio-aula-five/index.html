<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 05 - Laços de Repetição</title>
  </head>
  <body>
    <h1></h1>

    <script>
      // FOR → Mostrando números de 1 a 10
      for (let i = 1; i <= 10; i++) {
        console.log("FOR:", i);
      }

      // WHILE → Contando até 5
      let contador = 1;
      while (contador <= 20) {
        if (contador % 2 == 0) {
          console.log("WHILE:", contador);
        }
        contador++;
      }

      // DO...WHILE → Executa ao menos uma vez
      let senha;
      do {
        senha = prompt("Digite a senha: ");
      } while (senha !== "1234");
      console.log("Acesso permitido!");
    </script>
  </body>
</html>
