<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 4 - Estruturas de Decisão</title>
</head>
<body>
    <h1>Estruturas de Decisão</h1>

    <script>
    let idade = Number(prompt("Digite sua idade:"));

    if (idade < 12) {
      alert("Criança");
    } else if (idade <= 17) {
      alert("Adolescente");
    } else if (idade <= 59) {
      alert("Adulto");
    } else {
      alert("Idoso");
    }
    </script>
</body>
</html>
